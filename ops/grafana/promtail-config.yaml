server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: sandbox-quant-var-logs
    pipeline_stages:
      - json:
          expressions:
            service: service
            mode: mode
            kind: kind
            message: message
      - labels:
          service:
          mode:
          kind:
    static_configs:
      - targets:
          - localhost
        labels:
          job: sandbox-quant-var-logs
          source: file-log
          __path__: /workspace/var/log/*.jsonl
      - targets:
          - localhost
        labels:
          job: sandbox-quant-var-logs
          source: file-log
          __path__: /workspace/var/log/**/*.jsonl

  - job_name: sandbox-quant-event-log
    pipeline_stages:
      - json:
          expressions:
            ts: ts
            kind: kind
      - labels:
          kind:
    static_configs:
      - targets:
          - localhost
        labels:
          job: sandbox-quant-event-log
          source: event-log
          __path__: /workspace/var/*.jsonl
